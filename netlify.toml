[build]
  publish = "."
  functions = "netlify/functions"
  edge_functions = "edge-functions"

[functions]
  node_bundler = "esbuild"

[[edge_functions]]
  path = "/*"
  function = "siteline"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/simulator"
  to = "/simulator/"
  status = 200

[[redirects]]
  from = "/simulator/s/*"
  to = "/simulator/s/?id=:splat"
  status = 200

[[redirects]]
  from = "/simulator.html"
  to = "/simulator/"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
